<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrils Weather</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A5C8A">
    <meta name="app-version" content="__APP_VERSION__">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Cambrils Weather</h1>
        <p class="header-subtitle">Live Forecast</p>
        <a href="index.html" class="today-btn">&#8592; Back to Calendar</a>
    </header>

    <div class="weather-container">
        
        <div class="current-weather-card">
            <h3>Weather Right Now</h3>
            
            <div id="loadingText" class="weather-status">Loading the forecast…</div>
            
            <div id="weatherContent" style="display:none;">
                
                <div class="temp-big" id="currentTemp">--°</div>
                
                <div class="condition-row">
                    <div id="currentCondition" class="condition-text">--</div>
                    <div class="wind-metric">
                        💨 <span id="windSpeed">--</span> km/h
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-icon">🌅</span>
                        <div class="stat-text">
                            <span id="sunriseTime">--:--</span>
                            <div class="stat-label">Sunrise</div>
                        </div>
                    </div>

                    <div class="stat-item">
                        <span class="stat-icon">🌇</span>
                        <div class="stat-text">
                            <span id="sunsetTime">--:--</span>
                            <div class="stat-label">Sunset</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="forecast-list" id="forecastList">
            </div>

    </div>

    <script type="module" src="weather.js"></script>
</body>
</html>
