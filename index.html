<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family House Calendar</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-title" content="Cambrils">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A5C8A">
    <meta name="app-version" content="__APP_VERSION__">

    <!--
        iPhone PWA launch image. Apple uses the link whose media query matches the
        device, showing the photo as the static native splash so iPhones never see
        the sunshine icon flash. Android ignores these tags entirely.
    -->
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash-cambrils.jpg">

    <!--
        Critical splash CSS, inlined so the overlay paints on the very first frame
        before style.css has loaded. This keeps the OS-handoff seamless on iOS and
        minimises how long the Android icon-flash is visible.
    -->
    <style>
        #appSplash{position:fixed;inset:0;z-index:99999;background:#6EB4D6;overflow:hidden;}
        #appSplash::before{content:"";position:absolute;inset:0;background-image:url('splash-cambrils.jpg');background-size:cover;background-position:center;will-change:transform,opacity;transform:scale(1);}
        body.app-splash-active{overflow:hidden;}
        body.app-splash-active header{opacity:0;}
    </style>

    <script src="./fullcalendar.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="app-splash-active">

    <div id="appSplash" aria-hidden="true"></div>

    <div id="updateBanner" class="update-banner" hidden>
        <span class="update-banner-text">A new version is ready.</span>
        <button id="updateBannerBtn" class="update-banner-btn">Update now</button>
    </div>

    <!-- Guided booking flow -->
    <div id="bookingModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">

            <div id="bookingStep1">
                <div class="flow-step-label">Step 1 of 3</div>
                <h3>Who is staying?</h3>
                <div id="nameOptions" class="name-options"></div>
                <div class="modal-actions">
                    <button id="bookingCancelBtn" class="btn-cancel">Cancel</button>
                </div>
            </div>

            <div id="bookingStep2" style="display:none;">
                <div class="flow-step-label">Step 2 of 3</div>
                <h3>Which dates?</h3>

                <!-- hidden inputs keep the rest of the flow unchanged -->
                <input type="hidden" id="arrivalDate">
                <input type="hidden" id="departureDate">

                <p id="pickerHint" class="picker-hint">Tap your <strong>arrival</strong> day to start.</p>

                <div class="picker-month-nav">
                    <button id="pickerPrevBtn" class="month-nav-btn" aria-label="Previous month">&#8592;</button>
                    <span id="pickerMonthLabel" class="picker-month-label"></span>
                    <button id="pickerNextBtn" class="month-nav-btn" aria-label="Next month">&#8594;</button>
                </div>

                <div id="bookingPicker" class="booking-picker"></div>

                <div id="nightsSummary" class="nights-summary" style="display:none;"></div>
                <div class="modal-actions" style="margin-top:16px;">
                    <button id="datesBackBtn" class="btn-cancel">Back</button>
                    <button id="datesNextBtn" class="btn-confirm" disabled>Continue</button>
                </div>
            </div>

            <div id="bookingStep3" style="display:none;">
                <div class="flow-step-label">Step 3 of 3</div>
                <h3>Does this look right?</h3>
                <div id="reviewSummary" class="nights-summary"></div>
                <div class="modal-actions">
                    <button id="reviewBackBtn" class="btn-cancel">Back</button>
                    <button id="reviewConfirmBtn" class="btn-confirm">Yes, book it</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Shared system modal: confirm / password / loading / success / details -->
    <div id="systemModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div id="sysVisual"></div>
            <h3 id="sysModalTitle">Title</h3>
            <p id="sysModalMessage" class="modal-message">Message goes here</p>

            <input type="password" id="sysInput" class="modal-input" placeholder="Enter Passcode" style="display:none;">

            <div id="sysActions" class="modal-actions">
                <button id="sysCancelBtn" class="btn-cancel">Cancel</button>
                <button id="sysConfirmBtn" class="btn-confirm">OK</button>
            </div>
        </div>
    </div>

    <header>
        <h1>Cambrils House</h1>
        <p class="header-subtitle">Family Booking Calendar</p>

        <div class="header-actions">
            <button id="customTodayBtn" class="today-btn">Go to Today</button>
            <a href="weather.html" class="weather-btn">Check Weather</a>
        </div>
    </header>

    <div class="calendar-shell">

        <button id="openBookingBtn" class="add-booking-btn">
            <span class="plus">+</span> Add a Booking
        </button>

        <div id="legend" class="legend">
            <div class="legend-title">Who each colour belongs to</div>
        </div>

        <div class="month-nav">
            <button id="prevMonthBtn" class="month-nav-btn" aria-label="Previous month">&#8592; Previous</button>
            <h2 id="currentMonthLabel">Month</h2>
            <button id="nextMonthBtn" class="month-nav-btn" aria-label="Next month">Next &#8594;</button>
        </div>

        <div id="calendar"></div>
    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
